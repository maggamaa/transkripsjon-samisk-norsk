# The name of the GitHub Action flow
name: Bygg og publiser Docker-image til GHCR

# This Action runs every time you push a change to the 'main' branch
on:
  push:
    branches: [ "main" ]
    
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Using a standard, fresh Ubuntu machine to run the job
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checking out your code from the repository
      - name: Hent kode
        uses: actions/checkout@v4

      # NEW STEP: Free up disk space by manually deleting large, unnecessary folders
      - name: Frigjør diskplass
        run: |
          echo "Før rydding:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          echo "Etter rydding:"
          df -h

      # Step 2: Log in to GitHub Container Registry (GHCR)
      # It uses a secret to avoid exposing your password.
      - name: Logg inn på GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }} # Replaced: ${{ secrets.CR_PAT }}

      # Step 3: Build the Docker image based on your Dockerfile and push it to GHCR
      - name: Bygg og push Docker-image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/transkripsjon-samisk-norsk:latest
